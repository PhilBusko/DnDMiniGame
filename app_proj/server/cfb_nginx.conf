# cfb_nginx.conf

# the upstream component nginx needs to connect to
upstream django {
    server unix:///home/testor/CFB_Proj/CFB_Site/app_proj/server/cfb_socket.sock; 
    # server 127.0.0.1:8001;
}

# configuration of the server
server {
    listen      80;
    server_name lige-ma.com; 

    charset     utf-8;
    client_max_body_size 75M;   

    client_body_timeout 300s;       # downloading galleries takes time
    uwsgi_read_timeout 300s; 

    location /static {
        alias /home/testor/CFB_Proj/CFB_Site/app_proj/static/; 
    }

    location /media {
        alias /home/testor/CFB_Proj/CFB_Site/app_proj/media/; 
    }

    location / {
        uwsgi_pass  django;
        include /home/testor/CFB_Proj/CFB_Site/app_proj/server/uwsgi_params; 
    }
}

